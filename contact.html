<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اتصل بنا - AMM INTL Group</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        :root { --primary: #0f172a; --accent: #f59e0b; }
        body { font-family: 'Cairo', sans-serif; margin:0; padding:0; color:#333; background:#f8fafc; line-height:1.8; }
        nav { background: white; padding: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align:center; }
        nav a { margin: 0 15px; color: var(--primary); text-decoration: none; font-weight: 600; }
        .content { max-width: 700px; margin: 50px auto; padding: 50px; background: white; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        input, textarea { width: 100%; padding: 15px; margin: 12px 0; border-radius: 8px; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">الرئيسية</a>
        <a href="about.html">عن المجموعة</a>
        <a href="business-model.html">نموذج أعمالنا</a>
        <a href="compliance.html">الأمان والامتثال</a>
        <a href="contact.html">اتصل بنا</a>
    </nav>

    <div class="content">
        <h1>تواصل معنا</h1>
        <form id="contactForm">
            <input type="text" placeholder="الاسم الكامل" required>
            <input type="tel" placeholder="رقم الواتساب" required>
            <textarea rows="6" placeholder="تفاصيل طلبك أو استفسارك"></textarea>
            <button type="submit" style="width:100%; padding:16px; background:#f59e0b; color:white; border:none; border-radius:50px; font-size:1.2rem; cursor:pointer;">إرسال الرسالة</button>
        </form>
    </div>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('✅ تم استلام رسالتك بنجاح!\nسنتواصل معك قريباً عبر الواتساب');
            this.reset();
        });
    </script>
</body>
</html>
